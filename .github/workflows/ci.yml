name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv pip install -e ".[ml,api,tui,dev]" --system
      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=src/tokenlens --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=85
      - name: Check core/adapters/agent coverage (95%)
        run: |
          pytest tests/ --cov=src/tokenlens/core --cov=src/tokenlens/adapters \
            --cov=src/tokenlens/agent --cov-report=term-missing --cov-fail-under=95
      - name: Check ml/ coverage (75%)
        run: |
          pytest tests/ --cov=src/tokenlens/ml --cov-report=term-missing \
            --cov-fail-under=75

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Build package
        run: uv build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
