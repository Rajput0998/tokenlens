services:
  tokenlens:
    build:
      context: .
      target: full
    container_name: tokenlens
    restart: unless-stopped
    ports:
      - "7890:7890"
    volumes:
      - ~/.claude:/.claude:ro
      - ~/.kiro:/.kiro:ro
      - tokenlens-data:/data
    environment:
      - TOKENLENS_GENERAL__DATA_DIR=/data
      - TOKENLENS_API__HOST=0.0.0.0
      - TOKENLENS_API__PORT=7890
      - TOKENLENS_ADAPTERS__CLAUDE_CODE__LOG_PATH=/.claude/projects
    healthcheck:
      test: ["CMD", "tokenlens", "status", "--short"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tokenlens-data:
