repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5
          - sqlalchemy>=2.0
          - types-aiofiles
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        entry: mypy src/tokenlens/
